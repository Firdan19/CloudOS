name: Build Tobacco Kernel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src, llvm-tools-preview, rustfmt
      - run: cargo fmt --check
      - name: Install GRUB ISO tools
        run: |
          sudo apt-get update
          sudo apt-get install -y grub-pc-bin xorriso mtools nasm qemu-system-x86
      - name: Assemble interrupt stubs
        run: |
          mkdir -p target
          nasm -f elf64 src/interrupts.asm -o target/interrupts.o
      - run: RUSTFLAGS="-C link-arg=-Tlinker.ld -C link-arg=$PWD/target/interrupts.o" cargo build --release --target x86_64-unknown-none.json -Z build-std=core,compiler_builtins -Z build-std-features=compiler-builtins-mem -Zjson-target-spec
      - name: Prepare ISO root
        run: |
          mkdir -p iso/boot/grub
          cp target/x86_64-unknown-none/release/tobacco-kernel iso/boot/tobacco-kernel
          cp grub.cfg iso/boot/grub/grub.cfg
      - name: Create GRUB Multiboot2 ISO
        run: grub-mkrescue -o tobacco.iso iso
      - name: Prepare CI ISO root
        run: |
          mkdir -p iso-ci/boot/grub
          cp target/x86_64-unknown-none/release/tobacco-kernel iso-ci/boot/tobacco-kernel
          cp scripts/grub-ci.cfg iso-ci/boot/grub/grub.cfg
      - name: Create GRUB Multiboot2 CI ISO
        run: grub-mkrescue -o tobacco-ci.iso iso-ci
      - name: Smoke test ISO boot and commands
        run: sh scripts/ci-smoke-test.sh tobacco-ci.iso serial.log 12
      - name: Prepare CI Page Fault ISO root
        run: |
          mkdir -p iso-ci-pagefault/boot/grub
          cp target/x86_64-unknown-none/release/tobacco-kernel iso-ci-pagefault/boot/tobacco-kernel
          cp scripts/grub-ci-pagefault.cfg iso-ci-pagefault/boot/grub/grub.cfg
      - name: Create GRUB Multiboot2 CI Page Fault ISO
        run: grub-mkrescue -o tobacco-ci-pagefault.iso iso-ci-pagefault
      - name: Fault test page fault handler
        run: sh scripts/ci-fault-test.sh tobacco-ci-pagefault.iso serial-pagefault.log pagefault 8
      - name: Prepare CI Double Fault ISO root
        run: |
          mkdir -p iso-ci-doublefault/boot/grub
          cp target/x86_64-unknown-none/release/tobacco-kernel iso-ci-doublefault/boot/tobacco-kernel
          cp scripts/grub-ci-doublefault.cfg iso-ci-doublefault/boot/grub/grub.cfg
      - name: Create GRUB Multiboot2 CI Double Fault ISO
        run: grub-mkrescue -o tobacco-ci-doublefault.iso iso-ci-doublefault
      - name: Fault test double fault handler
        run: sh scripts/ci-fault-test.sh tobacco-ci-doublefault.iso serial-doublefault.log doublefault 8
      - name: Upload serial smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tobacco-serial-log
          path: |
            serial.log
            serial-pagefault.log
            serial-doublefault.log
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        with:
          name: tobacco-iso
          path: tobacco.iso
